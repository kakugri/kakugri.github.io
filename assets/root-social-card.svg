      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#efe6da"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6d6e"/>
